<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaya Hari Parayana Sangha</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- INTRO ANIMATION --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background-color: #fffbeb;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            pointer-events: none;
            animation: fadeOutOverlay 1s forwards 2.5s;
        }

        .intro-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .intro-text {
            font-weight: 900;
            color: #7c2d12;
            text-transform: uppercase;
            font-size: 1.5rem;
            position: absolute;
            white-space: nowrap;
        }

        .intro-hari { animation: slideLeft 1.5s cubic-bezier(0.87, 0, 0.13, 1) forwards 1s; }
        .intro-vayu { animation: slideRight 1.5s cubic-bezier(0.87, 0, 0.13, 1) forwards 1s; }

        .intro-logo {
            width: 150px;
            z-index: 10;
            transform: scale(0);
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            animation: zoomInLogo 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards 0.2s;
        }

        @keyframes zoomInLogo { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes slideLeft { 0% { transform: translateX(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateX(-150%); opacity: 0; } }
        @keyframes slideRight { 0% { transform: translateX(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateX(150%); opacity: 0; } }
        @keyframes fadeOutOverlay { to { opacity: 0; visibility: hidden; } }

        /* --- CORE STYLES --- */
        body { display: flex; flex-direction: column; font-family: sans-serif; min-height: 100vh; background-color: #fffbeb; margin: 0; padding: 0; }
        @media (min-width: 768px) { body { height: 100vh; overflow: hidden; } }
        
        .tab-btn { padding:14px; border-radius:12px; cursor:pointer; font-weight:600; background-color: #fde68a; transition: 0.2s; font-size: 1rem; border: 1px solid transparent; color: #92400e; white-space: nowrap; display: flex; align-items: center; gap: 12px; }
        .tab-btn:hover { background-color: #fb923c; color: white; }
        .active-tab { background-color: #ea580c !important; color: white !important; border-color: #9a3412; }
        
        @media (min-width: 768px) { .tab-btn { padding: 10px; font-size: 0.85rem; } }

        .top-btn { padding:6px 16px; border-radius:9999px; font-weight:bold; margin-right:8px; background-color: #fde68a; font-size: 0.85rem; color: #92400e; transition: 0.3s; border: 1px solid #fcd34d; }
        .top-btn.active { background-color: #ea580c !important; color: white !important; border-color: #9a3412; }

        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #fb923c; border-radius: 10px; }

		.motto-text { font-weight: 900; color: #7c2d12; text-transform: uppercase; letter-spacing: 0.02em; font-size: 0.65rem; line-height: 1.2; max-width: 60px; display: block; }
		@media (min-width: 768px) { .motto-text { font-size: 1.35rem; max-width: none; letter-spacing: 0.05em; } }

        /* --- MOBILE MENU SLIDE ANIMATION --- */
        @media (max-width: 767px) {
            #sidebar {
                position: fixed;
                top: 0;
                left: 0;
                z-index: 100;
                width: 100%;
                height: 100%;
                background: linear-gradient(180deg, #fffbeb 0%, #ffedd5 100%);
                display: flex;
                flex-direction: column;
                padding: 24px;
                overflow-y: auto;
                
                /* Start hidden above the screen */
                transform: translateY(-100%);
                transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
                visibility: hidden;
            }
            #sidebar.active-mobile { 
                transform: translateY(0); 
                visibility: visible;
            }
            .tab-btn { 
                font-size: 1.25rem; 
                padding: 18px; 
                margin-bottom: 12px; 
                box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
                border: 1px solid #fcd34d;
            }
        }

        .mobile-menu-btn {
            background-color: #c2410c; 
            color: #000000;            
            border: 2px solid #7c2d12;  
            font-weight: 800;
            padding: 6px 20px;
            border-radius: 9999px;
            font-size: 0.85rem;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        .mobile-menu-btn:active { transform: scale(0.9); }

        #audioPlayerBar { position: fixed; bottom: 0; left: 0; right: 0; background: #7c2d12; color: white; padding: 12px 20px; z-index: 10000; display: none; align-items: center; justify-content: space-between; border-top: 2px solid #ea580c; }
    </style>
</head>

<body>

<div id="intro-overlay">
    <div class="intro-container">
        <span class="intro-text intro-hari">Hari Sarvothama</span>
        <img src="JHPS.jpg" alt="Logo" class="intro-logo">
        <span class="intro-text intro-vayu">Vayu Jeevothama</span>
    </div>
</div>

<header class="bg-yellow-100 p-2 md:p-3 shadow-sm shrink-0 border-b border-yellow-200 relative z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center gap-2">
        <div class="flex-1 flex items-center justify-start gap-2">
            <img src="images/Ram.jpg" alt="Ram" class="h-10 w-10 md:h-20 md:w-20 rounded-full border-2 border-orange-400 object-cover shadow-sm shrink-0">
            <span class="motto-text">Hari Sarvothama</span>
        </div>

        <div class="shrink-0 flex flex-col items-center">
            <img src="JHPS.jpg" alt="JHPS Logo" class="h-16 md:h-40 w-auto rounded-xl shadow-lg border-2 border-white bg-white">
            <button onclick="toggleMobileMenu()" class="md:hidden mt-2 mobile-menu-btn">
                <i class="fa-solid fa-bars mr-1"></i> MENU
            </button>
        </div>

        <div class="flex-1 flex items-center justify-end gap-2 text-right">
            <span class="motto-text">Vayu Jeevothama</span>
            <img src="images/Hanuman.jpg" alt="Hanuman" class="h-10 w-10 md:h-20 md:w-20 rounded-full border-2 border-orange-400 object-cover shadow-sm shrink-0">
        </div>
    </div>
</header>

<div class="flex flex-col md:flex-row flex-1 overflow-hidden relative">
    <aside id="sidebar" class="hidden md:flex w-full md:w-60 bg-yellow-100 p-3 md:p-4 border-b md:border-r border-yellow-200 flex-col shrink-0 overflow-x-auto md:overflow-y-auto custom-scroll gap-2">
        <div class="md:hidden flex justify-between items-center mb-8 border-b border-orange-200 pb-4">
            <span class="text-2xl font-black text-orange-900">Select Category</span>
            <button onclick="toggleMobileMenu()" class="text-4xl text-orange-700"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
        
        <div id="parayanaTab" class="tab-btn active-tab" onclick="handleMenuClick('parayana')"><span>📖</span> Parayana</div>
        <div id="stotrasTab" class="tab-btn" onclick="handleMenuClick('stotras')"><span>📜</span> Stotras</div>
        <div id="bhajanaTab" class="tab-btn" onclick="handleMenuClick('bhajana')"><span>🎵</span> Bhajana</div>
        <div id="learningsTab" class="tab-btn" onclick="handleMenuClick('learnings')"><span>🎓</span> Learnings</div>
        <div id="sevaTab" class="tab-btn" onclick="handleMenuClick('seva')"><span>❤️</span> Seva</div>
		<div id="eventsTab" class="tab-btn" onclick="handleMenuClick('events')"><span>📅</span> Events</div> 
		<div id="aboutTab" class="tab-btn" onclick="handleMenuClick('about')"><span>ℹ️</span> About</div>
        <div id="contactTab" class="tab-btn" onclick="handleMenuClick('contact')"><span>📞</span> Contact</div>
    </aside>

    <main class="flex-1 p-4 md:p-6 flex flex-col overflow-hidden relative">
        <div id="topNav" class="mb-4 flex items-center shrink-0">
            <button id="lang1Btn" class="top-btn active" onclick="handleTopBtn(1)">Details</button>
            <button id="lang2Btn" class="top-btn" onclick="handleTopBtn(2)">Gallery</button>
            <button id="lang3Btn" class="top-btn hidden" onclick="handleTopBtn(3)">Sanskrit</button>
        </div>
        <div id="contentArea" class="bg-white p-4 md:p-6 rounded-2xl shadow-md border border-yellow-100 flex-1 overflow-y-auto custom-scroll">
        </div>
    </main>
</div>

<div id="audioPlayerBar">
    <div class="flex items-center gap-3">
        <i id="discIcon" class="fa-solid fa-compact-disc text-2xl text-orange-400"></i>
        <div class="overflow-hidden"><p id="audioName" class="text-xs font-bold truncate w-32 md:w-64">Select Audio</p></div>
    </div>
    <audio id="globalAudio"></audio>
    <div class="flex items-center gap-5">
        <button onclick="toggleAudio()" class="text-2xl outline-none"><i id="masterPlayIcon" class="fa-solid fa-pause"></i></button>
        <button onclick="stopAudio()" class="text-lg text-orange-300 outline-none"><i class="fa-solid fa-xmark"></i></button>
    </div>
</div>

<script src="scripts/learnings.js"></script>
<script src="scripts/learning-parts-sv.js"></script>
<script src="scripts/stotras.js"></script>
<script src="scripts/contacts.js"></script>
<script src="scripts/parayana.js"></script>
<script src="scripts/events.js"></script>
<script src="scripts/bhajana.js"></script>
<script src="scripts/seva.js"></script>
<script src="scripts/gallery.js"></script> 
<script src="scripts/main-logic.js"></script>

<script>
    function toggleMobileMenu() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('active-mobile');
    }

    function handleMenuClick(tab) {
        if (typeof switchTab === "function") {
            switchTab(tab);
        }
        // Close with a slight delay for better UX after click
        if (window.innerWidth < 768) {
            setTimeout(() => {
                document.getElementById('sidebar').classList.remove('active-mobile');
            }, 150);
        }
    }

    window.addEventListener('load', () => {
        // Slide menu down automatically on mobile after intro
        if (window.innerWidth < 768) {
            setTimeout(() => {
                document.getElementById('sidebar').classList.add('active-mobile');
            }, 3600);
        }

        setTimeout(() => {
            const overlay = document.getElementById('intro-overlay');
            if (overlay) overlay.style.display = 'none';
        }, 3500);
    });
</script>

</body>
</html>
