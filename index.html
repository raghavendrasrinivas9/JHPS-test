<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Jaya Hari Parayana Sangha</title>
    <meta name="theme-color" content="#fef3c7">
    <link rel="manifest" href="manifest.json">
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro-overlay">
    <div class="intro-container">
        <span class="intro-text intro-hari">Hari Sarvothama</span>
        <img src="JHPS.jpg" alt="Logo" class="intro-logo">
        <span class="intro-text intro-vayu">Vayu Jeevothama</span>
    </div>
</div>

<header id="mainHeader" class="p-2 md:p-3 shadow-sm border-b border-yellow-200">
    <div class="max-w-6xl mx-auto flex justify-between items-center gap-2 h-full">
        <div class="flex-1 flex flex-col items-start gap-1">
            <div class="flex items-center gap-2">
                <img src="images/Ram.jpg" alt="Ram" class="h-10 w-10 md:h-20 md:w-20 rounded-full border-2 border-orange-400 object-cover shrink-0">
                <span class="motto-text">Hari Sarvothama</span>
            </div>
        </div>

        <div class="shrink-0">
            <img src="JHPS.jpg" alt="JHPS Logo" class="h-16 md:h-40 w-auto rounded-xl shadow-lg border-2 border-white bg-white">
        </div>

        <div class="flex-1 flex items-center justify-end gap-2 self-start md:self-center pt-1 md:pt-0">
            <span class="motto-text text-right">Vayu Jeevothama</span>
            <img src="images/Hanuman.jpg" alt="Hanuman" class="h-10 w-10 md:h-20 md:w-20 rounded-full border-2 border-orange-400 object-cover shrink-0">
        </div>
    </div>
</header>

<div class="app-container">
    <aside id="sidebar" class="hidden md:flex w-full md:w-60 bg-yellow-100 p-3 md:p-4 border-b md:border-r border-yellow-200 flex-col shrink-0 overflow-x-auto md:overflow-y-auto custom-scroll gap-2">
        <div id="parayanaTab" class="tab-btn active-tab" onclick="handleMenuClick('parayana')">📖 Parayana</div>
        <div id="stotrasTab" class="tab-btn" onclick="handleMenuClick('stotras')">📜 Stotras</div>
        <div id="bhajanaTab" class="tab-btn" onclick="handleMenuClick('bhajana')">🎵 Bhajana</div>
        <div id="learningsTab" class="tab-btn" onclick="handleMenuClick('learnings')">🎓 Learnings</div>
        <div id="sevaTab" class="tab-btn" onclick="handleMenuClick('seva')">❤️ Seva</div>
        <div id="eventsTab" class="tab-btn" onclick="handleMenuClick('events')">📅 Events</div> 
        <div id="aboutTab" class="tab-btn" onclick="handleMenuClick('about')">ℹ️ About</div>
        <div id="contactTab" class="tab-btn" onclick="handleMenuClick('contact')">📞 Contact</div>
    </aside>

    <main class="flex-1 p-4 md:p-6 flex flex-col overflow-hidden relative">
        <div id="topNav" class="mb-4 flex items-center shrink-0">
            <button id="lang1Btn" class="top-btn active" onclick="handleTopBtn(1)">Details</button>
            <button id="lang2Btn" class="top-btn" onclick="handleTopBtn(2)">Gallery</button>
            <button id="lang3Btn" class="top-btn hidden" onclick="handleTopBtn(3)">Sanskrit</button>
        </div>
        <div id="contentArea" class="bg-white p-4 md:p-6 rounded-2xl shadow-md border border-yellow-100 flex-1 overflow-y-auto custom-scroll">
        </div>
    </main>
</div>

<div id="audioPlayerBar"></div>

<script src="scripts/learnings.js"></script>
<script src="scripts/learning-parts-sv.js"></script>
<script src="scripts/stotras.js"></script>
<script src="scripts/contacts.js"></script>
<script src="scripts/parayana.js"></script>
<script src="scripts/events.js"></script>
<script src="scripts/bhajana.js"></script>
<script src="scripts/seva.js"></script>
<script src="scripts/gallery.js"></script> 
<script src="scripts/main-logic.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var menuItems = [
            { label: "📖 Parayana", url: "javascript:handleMenuClick('parayana')", icon: "fas fa-book-open" },
            { label: "📜 Stotras", url: "javascript:handleMenuClick('stotras')", icon: "fas fa-scroll" },
            { label: "🎵 Bhajana", url: "javascript:handleMenuClick('bhajana')", icon: "fas fa-music" },
            { label: "🎓 Learnings", url: "javascript:handleMenuClick('learnings')", icon: "fas fa-graduation-cap" },
            { label: "❤️ Seva", url: "javascript:handleMenuClick('seva')", icon: "fas fa-heart" },
            { label: "📅 Events", url: "javascript:handleMenuClick('events')", icon: "fas fa-calendar-alt" },
            { label: "ℹ️ About", url: "javascript:handleMenuClick('about')", icon: "fas fa-info-circle" },
            { label: "📞 Contact", url: "javascript:handleMenuClick('contact')", icon: "fas fa-phone" }
        ];

        if (window.median) {
            median.sidebar.setItems({
                "items": menuItems,
                "enabled": true,
                "persist": true
            });
        }
    });

    function handleMenuClick(tab) {
        if (typeof switchTab === "function") switchTab(tab);
    }

    window.addEventListener('load', () => {
        setTimeout(() => {
            const overlay = document.getElementById('intro-overlay');
            if (overlay) overlay.style.display = 'none';
        }, 3500);
    });
</script>

</body>
</html>
