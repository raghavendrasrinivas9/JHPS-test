<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* ... (existing styles) ... */

        /* --- MEDIAN APP OVERRIDES --- */
        
        /* 1. Hide the MENU button in-app */
        body.is-median-app .mobile-menu-btn {
            display: none !important;
        }

        /* 2. Hide the central JHPS logo in-app to save vertical space */
        body.is-median-app #centerLogoContainer {
            display: none !important;
        }

        /* 3. Adjust header padding and alignment when logo is hidden */
        body.is-median-app #mainHeader {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }

        body.is-median-app .motto-text {
            font-size: 0.8rem; /* Slightly larger text since logo is gone */
        }
    </style>
</head>

<body>

<header id="mainHeader" class="bg-yellow-100 p-2 md:p-3 shadow-sm shrink-0 border-b border-yellow-200 relative z-50">
    <div class="max-w-6xl mx-auto flex justify-between items-center gap-2">
        <div class="flex-1 flex flex-col items-start gap-1">
            <div class="flex items-center gap-2">
                <img src="images/Ram.jpg" alt="Ram" class="h-10 w-10 md:h-20 md:w-20 rounded-full border-2 border-orange-400 object-cover shadow-sm shrink-0">
                <span class="motto-text">Hari Sarvothama</span>
            </div>
            <button onclick="toggleMobileMenu()" class="md:hidden mobile-menu-btn">
                <i class="fa-solid fa-bars mr-1"></i> MENU
            </button>
        </div>

        <div id="centerLogoContainer" class="shrink-0">
            <img src="JHPS.jpg" alt="JHPS Logo" class="h-16 md:h-40 w-auto rounded-xl shadow-lg border-2 border-white bg-white">
        </div>

        <div class="flex-1 flex items-center justify-end gap-2">
            <span class="motto-text text-right">Vayu Jeevothama</span>
            <img src="images/Hanuman.jpg" alt="Hanuman" class="h-10 w-10 md:h-20 md:w-20 rounded-full border-2 border-orange-400 object-cover shadow-sm shrink-0">
        </div>
    </div>
</header>

<script>
    // Robust App Detection
    function detectEnvironment() {
        const ua = navigator.userAgent || navigator.vendor || window.opera;
        // Check for 'median' or 'gonative' strings added by the app wrapper
        if (/median|gonative/i.test(ua)) {
            document.body.classList.add('is-median-app');
        }
    }

    // Run detection immediately before the page fully loads to prevent "flicker"
    detectEnvironment();

    // ... (rest of your existing scripts: toggleMobileMenu, handleMenuClick, etc.)
    
    window.addEventListener('load', () => {
        // ... (existing overlay removal logic)
    });
</script>

</body>
</html>
